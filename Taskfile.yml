version: '3'

vars:
  # Detect host OS and ARCH if not explicitly passed
  OS: '{{.OS | default OS}}'
  ARCH: '{{.ARCH | default ARCH}}'
  DEFAULT_FFMPEG_SRC_BASE: '{{.FFMPEG_SRC_BASE | default (print .TASKFILE_DIR "/../../libs/ffmpeg") | clean}}'

tasks:
  apt-cache:
    desc: Ensure the apt-cache-proxy container is running
    internal: true
    run: once
    status:
      # The task is skipped if this command exits with 0 (i.e., container is running)
      - docker ps -q -f name=^apt-cache-proxy$ -f status=running | grep -q .
    cmds:
      # 1. Remove any stopped or dead container with this name to avoid conflicts
      - docker rm -f apt-cache-proxy 2>/dev/null || true

      # 2. Build the image only if it doesn't already exist locally
      - |
        if ! docker image inspect sameersbn/apt-cacher-ng >/dev/null 2>&1; then
          echo ">>> Building sameersbn/apt-cacher-ng image..."
          docker build -t sameersbn/apt-cacher-ng https://github.com/sameersbn/docker-apt-cacher-ng.git
        else
          echo ">>> Docker image sameersbn/apt-cacher-ng already exists. Skipping build."
        fi

      # 3. Start the proxy container
      - echo ">>> Launching apt-cache-proxy container..."
      - |
        docker run -d \
          --name apt-cache-proxy \
          -p 3142:3142 \
          -v /tmp/apt-cacher-ng:/var/cache/apt-cacher-ng \
          sameersbn/apt-cacher-ng

  create-ffmpeg-builder:
    desc: Set up a dedicated buildx container builder instance
    internal: true
    cmds:
      - |
        if ! docker buildx ls | grep -q "ffmpeg-builder"; then
          docker buildx create --use --driver docker-container --name ffmpeg-builder --bootstrap
        fi
      - docker buildx use ffmpeg-builder
      # Build the compiler-toolchain runner image using our local Dockerfile
      - |
        docker buildx build --progress=plain \
          --builder ffmpeg-builder \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from=type=local,src={{.TASKFILE_DIR}}/build_cache/buildx \
          --cache-to=type=local,dest={{.TASKFILE_DIR}}/build_cache/buildx,mode=max \
          --cache-to=type=inline \
          -t ffmpeg-builder \
          -f {{.TASKFILE_DIR}}/Dockerfile \
          --load {{.TASKFILE_DIR}}

  build:ffmpeg:
    desc: Build FFmpeg dynamically using multi-platform cross-compilation
    summary: |
      Compiles FFmpeg and its libraries across Linux, macOS, and Windows.
      Outputs built components directly to the local 'dist/' directory.
    deps:
      - task: apt-cache
      - task: create-ffmpeg-builder
    cmds:
      # Cross-compile across target OS and Architecture arrays
      - |
        {{- $os_list := .GOOS_VAR | default "windows,linux,darwin" | replace "[" "" | replace "]" "" | replace "'" "" | replace " " "" | splitList "," -}}
        {{- $arch_list := .ARCH_VAR | default "amd64,arm64" | replace "[" "" | replace "]" "" | replace "'" "" | replace " " "" | splitList "," -}}

        {{- range $os := $os_list }}
          {{- range $arch := $arch_list }}

        echo ">> Building FFmpeg for {{$os}}/{{$arch}}..."

        # Create localized workspace build caching structures
        mkdir -p "{{$.TASKFILE_DIR}}/build_cache/cargo_git" \
                 "{{$.TASKFILE_DIR}}/build_cache/ffmpeg_src" \
                 "{{$.TASKFILE_DIR}}/build_cache/ffmpeg_sysroot" \
                 "{{$.TASKFILE_DIR}}/build_cache/meson_cache" \
                 "{{$.TASKFILE_DIR}}/build_cache/apt_cache" \
                 "{{$.TASKFILE_DIR}}/build_cache/apt_lib_cache" \
                 "{{$.TASKFILE_DIR}}/build_cache/llvm-mingw" \
                 "{{$.TASKFILE_DIR}}/build_cache/ccache" \
                 "{{$.TASKFILE_DIR}}/build_cache/compiler-rt" \
                 "{{$.OUT_DIR}}/{{$os}}/{{$arch}}"

        docker run --rm \
          --add-host=host.docker.internal:host-gateway \
          -e MACOSX_DEPLOYMENT_TARGET="{{$.MACOSX_DEPLOYMENT_TARGET}}" \
          -v "{{$.OUT_DIR}}/{{$os}}/{{$arch}}:/output" \
          -v "{{$.TASKFILE_DIR}}/build_cache/ffmpeg_src:/build" \
          -v "{{$.TASKFILE_DIR}}/build_cache/ffmpeg_sysroot:/sysroot" \
          -v "{{$.TASKFILE_DIR}}/build_cache/meson_cache:/root/.cache/meson" \
          -v "{{$.TASKFILE_DIR}}/build_cache/apt_cache:/var/cache/apt" \
          -v "{{$.TASKFILE_DIR}}/build_cache/apt_lib_cache:/var/lib/apt" \
          -v "{{$.TASKFILE_DIR}}/build_cache/llvm-mingw:/var/cache/llvm-mingw" \
          -v "{{$.TASKFILE_DIR}}/build_cache/ccache:/var/cache/ccache" \
          -v "{{$.TASKFILE_DIR}}/build_cache/compiler-rt:/var/cache/compiler-rt" \
          ffmpeg-builder {{$os}} {{$arch}}

          {{- end }}
        {{- end }}

        echo ">> All FFmpeg builds complete."
    env:
      DOCKER_BUILDKIT: 1
      MACOSX_DEPLOYMENT_TARGET: '{{.MACOSX_DEPLOYMENT_TARGET}}'
    vars:
      DEFAULT_OUT_DIR: '{{$.TASKFILE_DIR}}/dist'
      OUT_DIR: '{{.OUT_DIR | default .DEFAULT_OUT_DIR }}'
      MACOSX_DEPLOYMENT_TARGET: '{{.MACOSX_DEPLOYMENT_TARGET | default "10.15"}}'

  # Base shared command
  build_base:
    internal: true
    dir: '{{.TASKFILE_DIR}}' # Force compilation directory to always be here
    cmds:
      - echo "Building sidecar for {{.GOOS}}/{{.GOARCH}} using FFmpeg libs from {{.FFMPEG_SRC_DIR}}..."
      - >
        CGO_ENABLED=1 
        CGO_CFLAGS="-I{{.FFMPEG_SRC_DIR}}/include" 
        CGO_LDFLAGS="-L{{.FFMPEG_SRC_DIR}}/lib {{.LDFLAGS_EXTRA}}" 
        GOOS={{.GOOS}} 
        GOARCH={{.GOARCH}}
        go build {{if eq .GOOS "windows"}}-ldflags="-H=windowsgui"{{end}} -o '{{.OUTFILE}}' "{{.TASKFILE_DIR}}/main.go"
      - echo "Built sidecar to '{{.OUTFILE}}'"
    vars:
      DEFAULT_OUT_DIR: '{{.TASKFILE_DIR}}/bin'
      OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'
      # Safely fall back to default output directory if OUT_DIR is empty or unresolved
      OUT_DIR: '{{if .OUT_DIR}}{{.OUT_DIR}}{{else}}{{.DEFAULT_OUT_DIR}}{{end}}'
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
      LDFLAGS_EXTRA: '{{.LDFLAGS_EXTRA}}'
      FFMPEG_SRC_BASE: '{{.FFMPEG_SRC_BASE | default (print .TASKFILE_DIR "/../../libs/ffmpeg") | clean}}'
      # Match the dynamic build directory to the target platform, not the host machine
      FFMPEG_SRC_DIR: '{{.FFMPEG_SRC_DIR | default (print .FFMPEG_SRC_BASE "/" .GOOS "/" .GOARCH) | clean}}'
      OUTFILE: '{{.OUT_DIR}}/{{.OUT_FILE_NAME}}{{if eq .GOOS "windows"}}.exe{{end}}'

  # Native Platform Tasks
  build:native:darwin:
    desc: "Builds FFmpeg sidecar for macOS"
    vars:
      OUT_DIR: '{{.OUT_DIR}}'
      OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'
      GOOS: darwin
      GOARCH: '{{.GOARCH | default "arm64"}}'
      # macOS requires specific frameworks for audio/video toolbox
      LDFLAGS_EXTRA: "-lavformat -lavcodec -lavutil -framework CoreFoundation -framework CoreMedia -framework VideoToolbox -framework AudioToolbox"
    cmds:
      - task: build_base
        vars:
          GOOS: '{{.GOOS}}'
          GOARCH: '{{.GOARCH}}'
          LDFLAGS_EXTRA: '{{.LDFLAGS_EXTRA}}'
          OUT_DIR: '{{.OUT_DIR}}'
          OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'

  build:native:windows:
    desc: "Builds FFmpeg sidecar for Windows"
    vars:
      GOOS: windows
      OUT_DIR: '{{.OUT_DIR}}'
      OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'
      GOARCH: '{{.GOARCH | default "amd64"}}'
      # Windows requires Winsock and threading libraries
      LDFLAGS_EXTRA: "-lavformat -lavcodec -lavutil -lws2_32 -lbcrypt -lmfplat -lmfuuid"
    cmds:
      - task: build_base
        vars:
          GOOS: '{{.GOOS}}'
          GOARCH: '{{.GOARCH}}'
          LDFLAGS_EXTRA: '{{.LDFLAGS_EXTRA}}'
          OUT_DIR: '{{.OUT_DIR}}'
          OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'

  build:native:linux:
    desc: "Builds FFmpeg sidecar for Linux"
    vars:
      OUT_DIR: '{{.OUT_DIR}}'
      OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'
      GOOS: linux
      GOARCH: '{{.GOARCH | default "amd64"}}'
      # Linux requires standard pthread and math libraries for static linking
      LDFLAGS_EXTRA: "-lavformat -lavcodec -lavutil -lm -lpthread -ldl"
    cmds:
      - task: build_base
        vars:
          GOOS: '{{.GOOS}}'
          GOARCH: '{{.GOARCH}}'
          LDFLAGS_EXTRA: '{{.LDFLAGS_EXTRA}}'
          OUT_DIR: '{{.OUT_DIR}}'
          OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'

  # The run task now maps dynamically based on passed arguments
  run:
    desc: "Builds and runs the sidecar for a specific platform (e.g., task run -- OS=linux ARCH=amd64)"
    vars:
      # Defaults to the host system if not provided
      TARGET_OS: '{{.OS | default "darwin"}}'
      TARGET_ARCH: '{{.ARCH | default "arm64"}}'
    deps:
      # This dynamically calls the correct build task
      - task: "build:native:{{.TARGET_OS}}"
        vars: 
          GOOS: '{{.TARGET_OS}}'
          GOARCH: '{{.TARGET_ARCH}}'
    cmds:
      - "{{.TASKFILE_DIR}}/bin/sidecar_{{.TARGET_OS}}_{{.TARGET_ARCH}}"

  # The build entrypoint mapping dynamically based on passed arguments
  build:
    desc: "Builds the sidecar for a specific platform (e.g., task build -- OS=linux ARCH=amd64)"
    vars:
      TARGET_OS: '{{.OS | default "darwin"}}'
      TARGET_ARCH: '{{.ARCH | default "arm64"}}'
      DEFAULT_OUT_DIR: '{{.TASKFILE_DIR}}/bin'
      # Evaluated via root absolute pathing to enforce strict boundaries
      OUT_DIR: '{{if .OUT_DIR}}{{print .ROOT_DIR "/" .OUT_DIR | clean}}{{else}}{{.DEFAULT_OUT_DIR}}{{end}}'
      DEFAULT_OUT_FILE_NAME: 'sidecar_{{.TARGET_OS}}_{{.TARGET_ARCH}}'
      OUT_FILE_NAME: '{{.OUT_FILE_NAME | default .DEFAULT_OUT_FILE_NAME}}'
      # Dynamically choose the target task name based on whether it matches the host OS/Arch
      TARGET_TASK: '{{if and (eq .TARGET_OS OS) (eq .TARGET_ARCH ARCH)}}build:native:{{.TARGET_OS}}{{else}}build:docker{{end}}'
      DEFAULT_FFMPEG_LIB_DIR: '{{$.TASKFILE_DIR}}/dist'
      FFMPEG_LIB_DIR: '{{if .FFMPEG_LIB_DIR}}{{print .ROOT_DIR "/" .FFMPEG_LIB_DIR | clean}}{{else}}{{.DEFAULT_FFMPEG_LIB_DIR}}{{end}}'
    cmds:
      # Natively call the resolved task using Task's internal pipeline
      - task: "{{.TARGET_TASK}}"
        vars:
          GOOS: '{{.TARGET_OS}}'
          GOARCH: '{{.TARGET_ARCH}}'
          TARGET_OS: '{{.TARGET_OS}}'
          TARGET_ARCH: '{{.TARGET_ARCH}}'
          OUT_DIR: '{{.OUT_DIR}}'
          OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'
          FFMPEG_LIB_DIR: '{{.FFMPEG_LIB_DIR}}'

  build:docker:
    desc: "Builds the sidecar via Docker cross-compilation"
    internal: true
    deps:
      - task: apt-cache
      - task: create-ffmpeg-builder
    vars:
      TARGET_OS: '{{.TARGET_OS}}'
      TARGET_ARCH: '{{.TARGET_ARCH}}'
      OUT_DIR: '{{.OUT_DIR}}'
      OUT_FILE_NAME: '{{.OUT_FILE_NAME}}'
      FFMPEG_LIB_DIR: '{{.FFMPEG_LIB_DIR}}'
    cmds:
      - echo ">> Routing to Docker cross-compiler for {{.TARGET_OS}}/{{.TARGET_ARCH}}..."
      - cmd: mkdir -p "{{.OUT_DIR}}"
        platforms: [linux, darwin]
      - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path '{{.OUT_DIR}}'"
        platforms: [windows]
      - |
        docker run --rm \
          --entrypoint /usr/local/bin/build_sidecar.sh \
          -e SIDECAR_OUT_DIR=/output \
          -e SIDECAR_OUT_FILE={{.OUT_FILE_NAME}} \
          -e MACOSX_DEPLOYMENT_TARGET="{{.MACOSX_DEPLOYMENT_TARGET}}" \
          -v "{{.OUT_DIR}}:/output" \
          -v "{{.TASKFILE_DIR}}:/src" \
          -v "{{.FFMPEG_LIB_DIR}}:/ffmpeg_libs" \
          ffmpeg-builder {{.TARGET_OS}} {{.TARGET_ARCH}} sidecar