syntax = "proto3";

package ffmpeg;

option go_package = "github.com/gotedo/gotedo-impress-ffmpeg-sidecar/proto";

// Service for controlling and consuming FFmpeg media streams
service FFmpegService {
    // StartStream initializes the decoding/muxing pipeline
    rpc StartStream(StreamRequest) returns (stream StreamResponse);

    // StopStream terminates an active sidecar pipeline
    rpc StopStream(StreamControlRequest) returns (StreamControlResponse);

    // AdjustLatency sends real-time drift correction commands to the sidecar
    rpc AdjustLatency(LatencyRequest) returns (LatencyResponse);

    // Unified control RPC for playback operations
    rpc ControlStream(ControlRequest) returns (ControlResponse);

    // GetAudioDevices returns available audio devices to the client
    rpc GetAudioDevices(DevicesRequest) returns (DevicesResponse);
}

message StreamRequest {
    string target_id = 1; // "preview" or projector screen ID string
    string file_path = 2;
    string audio_device_id = 3;
}

message StreamResponse {
    bytes fmp4_chunk = 1; // Raw binary fMP4 segment data
    double pts = 2;        // Current presentation timestamp of the muxed chunk in seconds
}

message StreamControlRequest {
    string target_id = 1;
}

message StreamControlResponse {
    bool success = 1;
    string message = 2;
}

message LatencyRequest {
    string target_id = 1;
    int32 delay_ms = 2;
}

message LatencyResponse {
    bool accepted = 1;
}

message ControlRequest {
    string target_id = 1;
    enum Action {
        PLAY = 0;
        PAUSE = 1;
        SEEK = 2;
        STOP = 3;
    }
    Action action = 2;
    int32 seek_seconds = 3; // Only used if action == SEEK
}

message ControlResponse {
    bool success = 1;
    string message = 2;
}

message DevicesRequest {}

message AudioDevice {
    string id = 1;
    string name = 2;
    bool is_default = 3;
}

message DevicesResponse {
    repeated AudioDevice devices = 1;
}